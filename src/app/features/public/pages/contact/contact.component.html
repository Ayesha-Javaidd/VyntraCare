<div class="bg-[#eef2fa] min-h-screen flex items-center py-24">
  <div
    class="max-w-7xl mx-auto px-6 w-full grid grid-cols-1 lg:grid-cols-2 gap-16"
  >
    <!-- Left Cards -->
    <div class="flex flex-col justify-center space-y-8">
      <h2 class="text-4xl font-bold text-[#0B1E4A]">Contact Information</h2>
      <div class="flex flex-col space-y-6">
        <!-- Phone -->
        <div
          class="flex flex-col items-center text-center space-y-3 p-6 bg-white rounded-3xl shadow-md hover:shadow-xl transition-shadow duration-300"
        >
          <div
            class="w-12 h-12 flex items-center justify-center text-[#0B1E4A] border border-[#0B1E4A]/20 rounded-full text-2xl"
          >
            <i class="fas fa-phone"></i>
          </div>
          <h3 class="font-semibold text-[#0B1E4A]">+82 543 6544</h3>
          <p class="text-sm text-[#475569]">
            Reach out to us anytime, we are happy to assist.
          </p>
        </div>

        <!-- Email -->
        <div
          class="flex flex-col items-center text-center space-y-3 p-6 bg-white rounded-3xl shadow-md hover:shadow-xl transition-shadow duration-300"
        >
          <div
            class="w-12 h-12 flex items-center justify-center text-[#0B1E4A] border border-[#0B1E4A]/20 rounded-full text-2xl"
          >
            <i class="fas fa-envelope"></i>
          </div>
          <h3 class="font-semibold text-[#0B1E4A]">mail&#64;grance.co</h3>

          <p class="text-sm text-[#475569]">
            Send us an email and we’ll respond promptly.
          </p>
        </div>

        <!-- Location -->
        <div
          class="flex flex-col items-center text-center space-y-3 p-6 bg-white rounded-3xl shadow-md hover:shadow-xl transition-shadow duration-300"
        >
          <div
            class="w-12 h-12 flex items-center justify-center text-[#0B1E4A] border border-[#0B1E4A]/20 rounded-full text-2xl"
          >
            <i class="fas fa-map-marker-alt"></i>
          </div>
          <h3 class="font-semibold text-[#0B1E4A]">London Eye, UK</h3>
          <p class="text-sm text-[#475569]">
            Visit us at our central London office.
          </p>
        </div>
      </div>
    </div>

    <!-- Right Form -->
    <div
      class="flex flex-col justify-center bg-[#d1d8e3] rounded-3xl p-10 shadow-lg hover:shadow-2xl transition-shadow duration-300"
    >
      <h2 class="text-3xl font-bold mb-4 text-[#0B1E4A]">Get In Touch</h2>
      <p class="text-sm text-[#475569] mb-6">
        Fill out the form below and we will get back to you as soon as possible.
      </p>
      <form
        #contactForm="ngForm"
        (ngSubmit)="onSubmit(contactForm)"
        class="space-y-4"
      >
        <input
          type="email"
          name="email"
          ngModel
          placeholder="Email"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-100 text-[#0B1E4A] placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#1E40AF]"
          required
        />
        <input
          type="text"
          name="phone"
          ngModel
          placeholder="Phone"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-100 text-[#0B1E4A] placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#1E40AF]"
          required
        />
        <input
          type="text"
          name="name"
          ngModel
          placeholder="Name"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-100 text-[#0B1E4A] placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#1E40AF]"
          required
        />
        <textarea
          name="message"
          ngModel
          placeholder="Message"
          class="w-full border border-gray-300 rounded-xl px-4 py-3 bg-gray-100 text-[#0B1E4A] placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#1E40AF] h-32 resize-none"
          required
        ></textarea>
        <button
          type="submit"
          class="w-full py-3 rounded-xl bg-[#162968] text-white font-bold hover:bg-[#2b4ba2] transition-colors"
        >
          Submit
        </button>
      </form>
    </div>
  </div>
</div>
