<app-header pageTitle="Product Management">
  <button app-button class="ml-auto" (click)="goBack()">
    <i class="fas fa-arrow-left mr-2"></i>
    Back
  </button>
</app-header>

<div class="p-6 space-y-6 bg-gray-50 min-h-screen">
  <!-- Stats Cards -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <app-stat-card
      title="Total Products"
      [value]="totalProducts"
      icon="fas fa-boxes"
    ></app-stat-card>
    <app-stat-card
      title="In Stock"
      [value]="inStock"
      icon="fas fa-check-circle"
    ></app-stat-card>
    <app-stat-card
      title="Low Stock"
      [value]="lowStock"
      icon="fas fa-exclamation-triangle"
    ></app-stat-card>
    <app-stat-card
      title="Out of Stock"
      [value]="outOfStock"
      icon="fas fa-times-circle"
    ></app-stat-card>
  </div>

  <!-- Filters + Add New Product -->
  <div class="flex flex-col lg:flex-row justify-between items-center gap-4">
    <app-filters
      [dropdowns]="productFilters"
      (filtersChange)="onFiltersChange($event)"
    ></app-filters>
    <button app-button (click)="addNewProduct()">
      <i class="fas fa-plus mr-2"></i>
      Add New Product
    </button>
  </div>

  <app-data-table
    [columns]="productColumns"
    [rows]="filteredProducts"
    [pageSize]="pageSize"
    [currentPage]="currentPage"
    [totalItems]="filteredProducts.length"
    [enableActions]="true"
    [visibleActions]="['edit', 'delete']"
    (pageChange)="currentPage = $event"
    (actionClick)="
      $event.action === 'edit'
        ? editProduct($event.row)
        : deleteProduct($event.row)
    "
  ></app-data-table>
</div>
