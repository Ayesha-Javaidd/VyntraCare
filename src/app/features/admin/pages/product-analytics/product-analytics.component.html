<app-header pageTitle="Product Analytics Overview"></app-header>

<div class="p-6 space-y-6">
  <div class="mb-4">
    <button
      class="flex items-center text-slate-800 cursor-pointer hover:text-gray-500 font-medium"
      (click)="goBack()"
    >
      <i class="fas fa-arrow-left mr-2"></i>
      Back to Dashboard
    </button>
  </div>

  <!-- Filters side by side (optional) -->
  <div class="flex flex-col md:flex-col gap-6 mt-4">
    <div class="flex-1">
      <div class="mt-4">
        <app-data-table
          title="Analytics (Products POV)"
          [columns]="analyticsColumns"
          [rows]="filteredAnalytics"
          [pageSize]="5"
          [currentPage]="1"
          [totalItems]="filteredAnalytics.length"
        ></app-data-table>
      </div>
    </div>

    <div class="flex-1">
      <div class="mt-4">
        <app-data-table
          title="Sales (Products Perspective)"
          [columns]="salesColumns"
          [rows]="filteredSales"
          [pageSize]="5"
          [currentPage]="1"
          [totalItems]="filteredSales.length"
        ></app-data-table>
      </div>
    </div>
  </div>
</div>
