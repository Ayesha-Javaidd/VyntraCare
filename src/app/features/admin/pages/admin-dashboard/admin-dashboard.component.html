<app-header></app-header>

<div class="p-6 space-y-6">
  <p class="text-muted-foreground">
    Welcome back! Here's what's happening with your business today.
  </p>

  <!-- Stats Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <app-stats-card
      *ngFor="let stat of stats"
      [title]="stat.title"
      [value]="stat.value"
      [change]="stat.change"
      [changeType]="stat.changeType"
      [icon]="stat.icon"
      [iconBgColor]="stat.iconBgColor"
      [iconColor]="stat.iconColor"
    ></app-stats-card>
  </div>

  <!-- Analytics & Revenue Full Width -->
  <div class="space-y-6 flex flex-col">
    <!-- Analytics Section -->
    <div class="bg-card rounded-lg border border-border p-6 shadow-sm w-full">
      <h2 class="text-xl font-semibold mb-4">Analytics</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div
          *ngFor="let section of analyticsSections"
          class="rounded-lg p-5 hover:bg-secondary/20 transition-colors duration-200 cursor-pointer flex items-start gap-4 bg-blue-100"
        >
          <div class="text-2xl text-blue-600 flex-shrink-0">
            <i [ngClass]="section.icon"></i>
          </div>
          <div>
            <h3 class="font-medium text-lg mb-1">{{ section.title }}</h3>
            <p class="text-sm text-muted-foreground">
              {{ section.description }}
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Revenue Tracking -->
    <div class="bg-card rounded-lg border border-border p-6 shadow-sm w-full">
      <h2 class="text-xl font-semibold mb-4">Revenue Tracking</h2>
      <div class="space-y-4">
        <div
          *ngFor="let revenue of revenueData; let i = index"
          class="b bg-red-50 rounded-lg p-5 flex justify-between items-start"
        >
          <div class="flex items-start gap-4">
            <div
              class="text-xl mt-1 flex-shrink-0"
              [ngClass]="i === 0 ? 'text-blue-600' : 'text-green-600'"
            >
              <i [ngClass]="i === 0 ? 'fas fa-store' : 'fas fa-building'"></i>
            </div>
            <div>
              <h3 class="font-medium text-lg">{{ revenue.title }}</h3>
              <p class="text-sm text-muted-foreground mt-1">
                {{ revenue.description }}
              </p>
            </div>
          </div>
          <div class="text-right">
            <div class="text-2xl font-bold">{{ revenue.amount }}</div>
            <div
              [ngClass]="getRevenueChangeColor(revenue.changeType)"
              class="text-sm font-medium mt-1"
            >
              {{ revenue.change }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Orders History -->
  <div
    class="bg-card rounded-lg border border-border p-6 shadow-sm w-full space-y-4"
  >
    <div class="flex justify-between items-center">
      <h2 class="text-xl font-semibold">Orders History</h2>
    </div>

    <!-- Filters -->
    <app-filters
      [searchPlaceholder]="'Search orders...'"
      [dropdowns]="orderFilterDropdowns"
      (filtersChange)="onOrderFiltersChange($event)"
    >
    </app-filters>

    <!-- Data Table -->
    <app-data-table
      title="Orders"
      [columns]="orderColumns"
      [rows]="filteredOrders"
      [pageSize]="5"
      [currentPage]="currentPage"
      [totalItems]="filteredOrders.length"
      [showViewAll]="true"
      viewAllRoute="/admin/orders"
      (pageChange)="currentPage = $event"
    >
    </app-data-table>
  </div>
</div>
