<app-header pageTitle="Manage Facilities"></app-header>

<div class="p-6 space-y-6">
  <p class="text-muted-foreground mt-2">
    Manage operational status and details for all care centers.
  </p>

  <!-- Add Facility -->
  <button
    (click)="addNewFacility()"
    class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2"
  >
    <i class="fas fa-plus mr-2"></i>
    Add New Facility
  </button>

  <!-- Filters -->
  <div class="bg-card rounded-lg border border-border p-6 shadow-sm">
    <app-filters
      [searchPlaceholder]="'Search facilities, managers...'"
      [dropdowns]="facilityFilters"
      (filtersChange)="onFiltersChange($event)"
    >
    </app-filters>

    <!-- Facilities Table -->
    <div class="mt-6">
      <app-data-table
        title="Facilities"
        [columns]="facilityColumns"
        [rows]="filteredFacilities"
        [pageSize]="pageSize"
        [currentPage]="currentPage"
        [totalItems]="filteredFacilities.length"
        [enableActions]="true"
        [visibleActions]="['view', 'edit', 'toggle']"
        (pageChange)="currentPage = $event"
        (actionClick)="viewDetails($event)"
      >
      </app-data-table>
    </div>
  </div>
</div>
