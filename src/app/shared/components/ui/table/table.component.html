<div [ngClass]="'overflow-x-auto ' + className">
  <table class="w-full text-left border-collapse">
    <thead>
      <tr class="border-b border-border">
        <th
          *ngFor="let header of headers"
          class="pb-4 pt-0 px-4 text-xs font-semibold text-muted-foreground uppercase tracking-wider"
        >
          {{ header }}
        </th>
      </tr>
    </thead>
    <tbody>
      <tr
        *ngFor="let row of rows; let i = index"
        class="border-b border-border/50 hover:bg-secondary/30 transition-colors duration-150 last:border-0"
      >
        <ng-container
          *ngIf="rowTemplate"
          [ngTemplateOutlet]="rowTemplate"
          [ngTemplateOutletContext]="{ $implicit: row, index: i }"
        ></ng-container>
      </tr>
    </tbody>
  </table>
</div>
