<div
  class="rounded-lg shadow-sm border border-gray-200 p-6 transition-colors duration-300"
  [ngClass]="bgColor"
>
  <div class="flex items-center justify-between">
    <div>
      <p class="text-sm font-medium text-gray-600 mb-1">{{ title }}</p>
      <p class="text-2xl font-bold text-gray-900">{{ value }}</p>
      <span
        *ngIf="change"
        class="text-sm font-medium mt-1 inline-block"
        [ngClass]="{
          'text-green-600': changeType === 'positive',
          'text-red-600': changeType === 'negative',
          'text-yellow-600': changeType === 'neutral'
        }"
      >
        {{ change }}
      </span>
    </div>
    <div class="p-3 rounded-lg" [ngClass]="iconBgClass">
      <i class="{{ icon }} text-xl" [ngClass]="iconColorClass"></i>
    </div>
  </div>
</div>
