<div [ngClass]="'flex flex-col gap-1.5 ' + className">
  <label *ngIf="label" class="text-sm font-medium text-muted-foreground px-1">{{ label }}</label>
  <div class="relative group">
    <select
      [value]="value"
      (change)="onChange($event)"
      class="w-full h-10 px-4 py-2 bg-secondary border border-border rounded-xl text-sm font-medium text-foreground appearance-none focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all duration-200 cursor-pointer"
    >
      <option *ngFor="let option of options" [value]="option.value">{{ option.label }}</option>
    </select>
    <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-muted-foreground group-hover:text-foreground transition-colors duration-200">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </div>
  </div>
</div>
