<div
  class="bg-white rounded-[2rem] border border-slate-100 p-6 shadow-sm hover:shadow-md transition-all group overflow-hidden"
>
  <!-- Image -->
  <div
    class="relative aspect-square mb-6 bg-slate-50 rounded-[1.5rem] flex items-center justify-center group-hover:scale-105 transition-transform duration-500 overflow-hidden"
  >
    <ng-container *ngIf="product.imageUrl; else placeholder">
      <img
        [src]="product.imageUrl"
        [alt]="product.name"
        class="w-full h-full object-cover"
      />
    </ng-container>

    <ng-template #placeholder>
      <svg
        class="w-16 h-16 text-slate-200"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1"
          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01"
        />
      </svg>
    </ng-template>

    <div
      class="absolute inset-0 bg-blue-600/0 group-hover:bg-blue-600/5 transition-colors"
    ></div>
  </div>

  <!-- Content -->
  <div>
    <h3
      class="font-bold text-slate-900 group-hover:text-blue-900 transition-colors leading-tight mb-2"
    >
      {{ product.name }}
    </h3>

    <div class="flex items-center gap-2 mb-4">
      <span
        class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"
      >
        {{ product.category }}
      </span>
      <span class="w-1 h-1 bg-slate-200 rounded-full"></span>
      <span
        class="text-[10px] font-bold uppercase tracking-widest"
        [ngClass]="{
          'text-amber-500': isLowStock,
          'text-green-500': !isLowStock
        }"
      >
        {{ isLowStock ? "Low Stock" : "In Stock" }}
      </span>
    </div>

    <div class="flex items-end justify-between pt-4 border-t border-slate-50">
      <div>
        <span
          class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1"
        >
          Standard Item
        </span>
        <span class="text-xl font-extrabold text-slate-900">
          ${{ product.price | number : "1.2-2" }}
        </span>
      </div>

      <button
        class="w-10 h-10 bg-blue-900 hover:bg-blue-400 cursor-pointer text-white rounded-xl flex items-center justify-center transition-all shadow-lg shadow-blue-100 group-hover:scale-110 active:scale-95"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 4v16m8-8H4"
          />
        </svg>
      </button>
    </div>
  </div>
</div>
