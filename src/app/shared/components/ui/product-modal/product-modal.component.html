<app-modal-shell
  [show]="show"
  [title]="mode === 'add' ? 'Add New Product' : 'Update Product'"
  [actionLabel]="mode === 'add' ? 'Add Product' : 'Update Product'"
  [isFormValid]="!!(product.name && product.category && product.unitType)"
  (close)="close.emit()"
  (submit)="handleSubmit()"
>
  <form class="space-y-6">
    <!-- Product Name -->
    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-700">Product Name</label>
      <input
        type="text"
        class="mt-1 px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 outline-none"
        [(ngModel)]="product.name"
        name="name"
        placeholder="e.g., Aspirin 100mg"
      />
    </div>

    <!-- Category -->
    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-700">Category</label>
      <select
        class="mt-1 px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 outline-none"
        [(ngModel)]="product.category"
        name="category"
      >
        <option value="" disabled>Select Category</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>

    <!-- Unit Type -->
    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-700">Unit Type</label>
      <select
        class="mt-1 px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 outline-none"
        [(ngModel)]="product.unitType"
        name="unitType"
      >
        <option value="" disabled>Select Unit</option>
        <option *ngFor="let u of units" [value]="u">{{ u }}</option>
      </select>
    </div>

    <!-- Product Image -->
    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-700">Product Image</label>
      <div
        class="mt-1 flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-lg p-6 cursor-pointer hover:border-blue-500 transition"
        (click)="$event.stopPropagation()"
      >
        <input type="file" class="hidden" (change)="onFileChange($event)" />
        <div *ngIf="!imagePreview" class="text-center text-gray-400">
          <i class="fa-solid fa-upload text-2xl mb-2"></i>
          <p class="text-sm">Click to upload or drag & drop</p>
          <p class="text-xs">SVG, PNG, JPG, GIF (max. 800x400px)</p>
        </div>
        <img
          *ngIf="imagePreview"
          [src]="imagePreview"
          alt="Preview"
          class="max-h-48 object-contain mt-2"
        />
      </div>
    </div>
  </form>
</app-modal-shell>
