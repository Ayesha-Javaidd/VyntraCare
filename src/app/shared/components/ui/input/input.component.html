<div [ngClass]="'flex flex-col gap-1.5 ' + className">
  <label class="text-sm font-medium text-muted-foreground px-1">{{ label }}</label>
  <div class="relative group">
    <div *ngIf="icon" class="absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground group-focus-within:text-primary transition-colors duration-200" [innerHTML]="icon"></div>
    <input
      [type]="type"
      [value]="value"
      (input)="onInputChange($event)"
      [placeholder]="placeholder"
      [required]="required"
      [ngClass]="dark
        ? 'w-full h-10 pl-10 py-2 rounded-xl text-sm font-medium bg-gray-800 border-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/20'
        : 'w-full h-10 pl-10 py-2 rounded-xl text-sm font-medium bg-secondary border-border text-foreground placeholder-muted-foreground/60 focus:outline-none focus:ring-2 focus:ring-primary/20'"
    />
  </div>
</div>
